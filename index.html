<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Arcade</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1f1f2e,#2b2b3d,#1a1a25);
color:white;
overflow:hidden;
}

h1{
text-align:center;
font-size:20px;
margin:15px 0;
opacity:0.9;
}

#menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.game{
background:rgba(255,255,255,0.08);
border-radius:12px;
padding:15px;
text-align:center;
font-size:12px;
cursor:pointer;
transition:0.2s;
user-select:none;
}

.game:active{
transform:scale(0.95);
}

.screen{
display:none;
height:100vh;
}

.active{
display:block;
}

.back{
position:fixed;
top:10px;
left:10px;
padding:10px;
background:#444;
border:none;
color:white;
border-radius:10px;
}

#noBtn{
position:absolute;
padding:10px 15px;
background:#666;
border:none;
color:white;
border-radius:10px;
}

canvas{
display:block;
margin:auto;
background:rgba(255,255,255,0.05);
border-radius:10px;
touch-action:manipulation;
}
</style>
</head>

<body>

<div class="screen active" id="home">
<h1>Mini Arcade 🎮</h1>

<div id="menu">

<div class="game" onclick="openGame(1)">🎯 Тап точки</div>
<div class="game" onclick="openGame(2)">💖 Сердца</div>
<div class="game" onclick="openGame(3)">🧠 Реакция</div>
<div class="game" onclick="openGame(4)">🟡 Уклонение</div>
<div class="game" onclick="openGame(5)">⚡ Скорость</div>
<div class="game" onclick="openGame(6)">🎲 Рандом</div>
<div class="game" onclick="openGame(7)">👆 Тап счетчик</div>
<div class="game" onclick="openGame(8)">📦 Коробки</div>
<div class="game" onclick="openGame(9)">🔵 Следи</div>
<div class="game" onclick="openGame(10)">🧩 Пазл</div>
<div class="game" onclick="openGame(11)">🎮 Удержи</div>
<div class="game" onclick="openGame(12)">🟢 Попади</div>
<div class="game" onclick="openGame(13)">💡 Логика</div>
<div class="game" onclick="openGame(14)">🔴 Увернись</div>
<div class="game" onclick="openGame(15)">🏁 Финиш</div>

</div>
</div>

<div class="screen" id="gameScreen">

<button class="back" onclick="back()">←</button>

<canvas id="c" width="300" height="400"></canvas>

<button id="noBtn">Нет</button>

</div>

<script>

let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let current = 0;

function openGame(n){
current = n;
document.getElementById("home").classList.remove("active");
document.getElementById("gameScreen").classList.add("active");
startGame(n);
}

function back(){
document.getElementById("home").classList.add("active");
document.getElementById("gameScreen").classList.remove("active");
ctx.clearRect(0,0,300,400);
}

let score = 0;

// 1 простой тап
function startGame(n){

score = 0;
ctx.clearRect(0,0,300,400);

if(n===1){
drawDot();
canvas.onclick = () => {
score++;
drawDot();
}
}

if(n===2){
heartGame();
}

if(n===3){
reactionGame();
}

if(n===4){
dodgeGame();
}

if(n===15){
finish();
}
}

function drawDot(){
ctx.clearRect(0,0,300,400);
ctx.fillStyle="white";
ctx.beginPath();
let x = Math.random()*280;
let y = Math.random()*380;
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();
}

// сердца (нормальные кликабельные)
function heartGame(){
let hearts = [];

for(let i=0;i<10;i++){
hearts.push({
x:Math.random()*280,
y:Math.random()*380
});
}

function draw(){
ctx.clearRect(0,0,300,400);

hearts.forEach(h=>{
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(h.x,h.y,15,0,Math.PI*2);
ctx.fill();
});
}

canvas.onclick = (e)=>{
let rect = canvas.getBoundingClientRect();
let x = e.clientX-rect.left;
let y = e.clientY-rect.top;

hearts = hearts.filter(h=>{
let dx = x-h.x;
let dy = y-h.y;
return Math.sqrt(dx*dx+dy*dy)>20;
});

draw();
};

draw();
}

// реакция
function reactionGame(){
let start = Date.now();
ctx.fillStyle="white";
ctx.fillText("ЖМИ!",120,200);

canvas.onclick = ()=>{
let time = Date.now()-start;
ctx.clearRect(0,0,300,400);
ctx.fillText(time+" ms",120,200);
};
}

// уклонение
function dodgeGame(){
let x = 150;
document.onmousemove = (e)=>{
x = e.clientX;
ctx.clearRect(0,0,300,400);
ctx.fillRect(x%300,200,20,20);
};
}

// финал
function finish(){
ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText("Пойдешь гулять?",60,180);
ctx.fillText("С меня вкусняшки ^-^",40,210);
}

// кнопка "Нет" убегает
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
noBtn.style.top=Math.random()*80+"vh";
noBtn.style.left=Math.random()*80+"vw";
});

</script>

</body>
</html>
