<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#12131a;
color:white;
overflow:hidden;
}

h1{
text-align:center;
font-size:18px;
margin:10px;
opacity:0.9;
}

#menu{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:10px;
}

.btn{
background:#1f2230;
padding:12px;
border-radius:10px;
text-align:center;
font-size:12px;
user-select:none;
transition:0.2s;
}

.btn:active{transform:scale(0.95);}

.screen{display:none;height:100vh;}
.active{display:block;}

.back{
position:fixed;
top:10px;
left:10px;
background:#333;
border:none;
color:white;
padding:8px;
border-radius:8px;
}

#gameArea{
position:relative;
height:100vh;
}

.obj{
position:absolute;
width:30px;
height:30px;
border-radius:50%;
background:red;
}

.no{
position:absolute;
padding:10px;
background:#555;
border:none;
color:white;
border-radius:10px;
}
</style>
</head>

<body>

<div class="screen active" id="home">
<h1>Mini Game Hub 🎮</h1>

<div id="menu">

<div class="btn" onclick="start(1)">🎯 Тап</div>
<div class="btn" onclick="start(2)">💖 Сердца</div>
<div class="btn" onclick="start(3)">⚡ Реакция</div>
<div class="btn" onclick="start(4)">🟡 Додж</div>
<div class="btn" onclick="start(5)">👆 Счет</div>
<div class="btn" onclick="start(6)">🎲 Рандом</div>
<div class="btn" onclick="start(7)">🧠 Память</div>
<div class="btn" onclick="start(8)">📦 Поймай</div>
<div class="btn" onclick="start(9)">🔵 Следи</div>
<div class="btn" onclick="start(10)">🧩 Логика</div>
<div class="btn" onclick="start(11)">🎮 Удержи</div>
<div class="btn" onclick="start(12)">🟢 Попади</div>
<div class="btn" onclick="start(13)">🔴 Увернись</div>
<div class="btn" onclick="start(14)">💡 Быстро</div>
<div class="btn" onclick="start(15)">🏁 Финал</div>

</div>
</div>

<div class="screen" id="game">
<button class="back" onclick="back()">←</button>
<div id="gameArea"></div>

<button class="no" id="noBtn">Нет</button>
</div>

<script>

let gameArea = document.getElementById("gameArea");
let noBtn = document.getElementById("noBtn");

function start(n){
document.getElementById("home").classList.remove("active");
document.getElementById("game").classList.add("active");

gameArea.innerHTML = "";
noBtn.style.display="none";

if(n===1) tapGame();
if(n===2) heartGame();
if(n===3) reaction();
if(n===4) dodge();
if(n===5) counter();
if(n===15) final();
}

// BACK
function back(){
document.getElementById("home").classList.add("active");
document.getElementById("game").classList.remove("active");
gameArea.innerHTML="";
}

// 1 TAP
function tapGame(){
let obj=document.createElement("div");
obj.className="obj";
obj.style.background="white";

obj.onclick=()=>{
obj.style.left=Math.random()*80+"vw";
obj.style.top=Math.random()*80+"vh";
};

gameArea.appendChild(obj);
move(obj);
}

function move(o){
setInterval(()=>{
o.style.left=Math.random()*80+"vw";
o.style.top=Math.random()*80+"vh";
},800);
}

// 2 HEARTS
function heartGame(){
for(let i=0;i<8;i++){
let h=document.createElement("div");
h.className="obj";
h.style.background="red";
h.onclick=()=>h.remove();
h.style.left=Math.random()*90+"vw";
h.style.top=Math.random()*80+"vh";
gameArea.appendChild(h);
}
}

// 3 REACTION
function reaction(){
let t=Date.now();
gameArea.innerHTML="<h3>ЖМИ!</h3>";
gameArea.onclick=()=>{
let ms=Date.now()-t;
gameArea.innerHTML="Время: "+ms+" ms";
}
}

// 4 DODGE
function dodge(){
noBtn.style.display="block";
noBtn.onmouseover=()=>{
noBtn.style.left=Math.random()*80+"vw";
noBtn.style.top=Math.random()*80+"vh";
}
}

// 5 COUNTER
function counter(){
let c=0;
gameArea.innerHTML="<h3>0</h3>";
gameArea.onclick=()=>{
c++;
gameArea.innerHTML="<h3>"+c+"</h3>";
}
}

// 15 FINAL
function final(){
gameArea.innerHTML=`
<h2>Пойдешь гулять?</h2>
<p>С меня вкусняшки ^-^</p>

<button onclick="yes()" style="padding:10px;margin:5px;">Да</button>
<button id="fakeNo" style="padding:10px;margin:5px;">Нет</button>
`;

let fakeNo=document.getElementById("fakeNo");

fakeNo.onmouseover=()=>{
fakeNo.style.position="absolute";
fakeNo.style.left=Math.random()*80+"vw";
fakeNo.style.top=Math.random()*80+"vh";
}
}

function yes(){
gameArea.innerHTML="<h2>Ок 👍</h2>";
}

</script>

</body>
</html>
