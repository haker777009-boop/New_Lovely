<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Run</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0e0f14;
color:white;
overflow:hidden;
}

.center{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

button{
padding:12px 18px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2a2f44;
color:white;
font-size:14px;
}

.obj{
position:absolute;
width:30px;
height:30px;
border-radius:50%;
background:#ff4d6d;
}

#no{
position:absolute;
background:#555;
}

h2,h3{margin:10px;}
</style>
</head>

<body>

<div id="menu" class="center">
<h2>Mini Game Run 🎮</h2>
<p>15 игр подряд без меню</p>
<button onclick="startGame()">START</button>
</div>

<div id="game" style="display:none; height:100vh; position:relative;"></div>

<script>

let game = document.getElementById("game");
let menu = document.getElementById("menu");

let i = 1;

function startGame(){
menu.style.display="none";
game.style.display="block";
i=1;
next();
}

function next(){
game.innerHTML="";
if(i>15){
game.innerHTML="<div class='center'><h2>Финиш 🏁</h2><p>Готово</p></div>";
return;
}

run(i);
i++;
}

/* =====================
   15 РАЗНЫХ ИГР
===================== */

function run(n){

// 1 TAP
if(n===1){
spawnTap();
}

// 2 HEARTS
if(n===2){
for(let k=0;k<8;k++){
let o=createObj("red");
o.onclick=()=>o.remove();
game.appendChild(o);
}
setTimeout(next,3000);
}

// 3 REACTION
if(n===3){
let t=Date.now();
game.innerHTML="<div class='center'><h3>ЖМИ</h3></div>";
game.onclick=()=>{
game.innerHTML="<div class='center'><h2>"+(Date.now()-t)+" ms</h2></div>";
setTimeout(next,1500);
};
}

// 4 DODGE
if(n===4){
let o=createObj("yellow");
setInterval(()=>{
o.style.left=Math.random()*80+"vw";
o.style.top=Math.random()*80+"vh";
},600);
setTimeout(next,4000);
}

// 5 COUNTER
if(n===5){
let c=0;
game.innerHTML="<div class='center'><h2>0</h2></div>";
game.onclick=()=>{
c++;
game.innerHTML="<div class='center'><h2>"+c+"</h2></div>";
};
setTimeout(next,4000);
}

// 6 LUCK
if(n===6){
game.innerHTML="<div class='center'><h3>Нажми</h3></div>";
game.onclick=()=>{
game.innerHTML="<div class='center'><h2>"+(Math.random()>0.5?"WIN":"LOSE")+"</h2></div>";
setTimeout(next,1500);
};
}

// 7 MEMORY
if(n===7){
let colors=["red","blue","green","yellow"];
let c=colors[Math.floor(Math.random()*4)];
game.style.background=c;
setTimeout(()=>{
game.style.background="#0e0f14";
game.innerHTML="<div class='center'><h3>Запомни был цвет</h3></div>";
setTimeout(next,2000);
},1000);
}

// 8 CATCH
if(n===8){
for(let k=0;k<5;k++){
let o=createObj("cyan");
o.onclick=()=>o.remove();
game.appendChild(o);
}
setTimeout(next,3000);
}

// 9 FOLLOW
if(n===9){
let o=createObj("lime");
document.onmousemove=(e)=>{
o.style.left=e.clientX+"px";
o.style.top=e.clientY+"px";
};
setTimeout(()=>{
document.onmousemove=null;
next();
},4000);
}

// 10 CHOICE
if(n===10){
game.innerHTML=`
<div class="center">
<button onclick="next()">A</button>
<button onclick="next()">B</button>
<button onclick="next()">C</button>
</div>`;
}

// 11 HOLD
if(n===11){
let t=0;
game.innerHTML="<div class='center'><h3>Удерживай</h3></div>";

game.onmousedown=()=>t=Date.now();
game.onmouseup=()=>{
game.innerHTML="<div class='center'><h2>"+(Date.now()-t)+" ms</h2></div>";
setTimeout(next,1500);
};
}

// 12 AIM
if(n===12){
let o=createObj("white");
o.onclick=()=>{o.remove();next();};
game.appendChild(o);
}

// 13 AGILITY
if(n===13){
let o=createObj("orange");
setInterval(()=>{
o.style.left=Math.random()*80+"vw";
o.style.top=Math.random()*80+"vh";
},400);
setTimeout(next,4000);
}

// 14 FAST
if(n===14){
let start=Date.now();
game.innerHTML="<div class='center'><h3>ЖМИ СЕЙЧАС</h3></div>";

setTimeout(()=>{
game.onclick=()=>{
game.innerHTML="<div class='center'><h2>"+(Date.now()-start)+" ms</h2></div>";
setTimeout(next,1500);
};
},1000);
}

// 15 FINAL
if(n===15){
game.innerHTML=`
<div class="center">
<h2>Пойдешь гулять?</h2>
<p>С меня вкусняшки ^-^</p>
<button onclick="finish()">Да</button>
<button id="no">Нет</button>
</div>`;

let no=document.getElementById("no");
no.onmouseover=()=>{
no.style.position="absolute";
no.style.left=Math.random()*80+"vw";
no.style.top=Math.random()*80+"vh";
};
}

}

/* =====================
   HELPERS
===================== */

function createObj(color){
let d=document.createElement("div");
d.className="obj";
d.style.background=color;
d.style.left=Math.random()*80+"vw";
d.style.top=Math.random()*80+"vh";
return d;
}

function spawnTap(){
let o=createObj("white");

o.onclick=()=>{
o.remove();
spawnTap();
}

game.appendChild(o);
}

function finish(){
game.innerHTML="<div class='center'><h2>Ок 👍</h2></div>";
}

</script>

</body>
</html>
